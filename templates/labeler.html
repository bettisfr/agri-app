<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>YOLO Image Labeler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='labeler-ui.css') }}">
</head>
<body>
    <!-- Viewer -->
    <div id="viewer">
        <div id="imageArea" class="stage">
            <img id="previewImage" alt="No image loaded">
            <canvas id="bboxCanvas"></canvas>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <!-- No file selection here; keep container in case you want
             extra controls later, but it will stay empty -->
        <div id="options"></div>

        <div id="controlsArea" class="disabled">
            <div class="sidebar-top-actions">
                <a id="backToGalleryBtn" href="/gallery">Back to Gallery</a>
            </div>
            <div class="sidebar-title-block">
                <h1>Image Labeler</h1>
                <p>Left click to select/create boxes. Middle/right drag to pan, wheel to zoom.</p>
            </div>
            <div id="status">Waiting for image parameter (?image=...).</div>

            <section id="info" class="sidebar-card">
                <div class="info-row">
                    <span class="info-label">File</span>
                    <span id="imgName" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Labels</span>
                    <span id="numLabels" class="info-value info-pill">—</span>
                </div>
            </section>

            <section id="labelsPanel" class="sidebar-card">
                <div class="labels-header">
                    <strong>Labels</strong>
                </div>

                <div id="labelsList"></div>
            </section>

            <div class="sidebar-actions">
                <button id="saveTxtBtn" class="option-button">Save labels</button>
                <button id="downloadCurrentBtn" class="option-button option-button-secondary">Download image + labels</button>
            </div>

        </div>
    </aside>

    <!-- IMPORTANT: point to the labeler-specific JS, not the gallery one -->
    <script src="{{ url_for('static', filename='labeler-app.js') }}"></script>
</body>
</html>
