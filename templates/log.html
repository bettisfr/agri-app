{% extends "base.html" %}

{% block page_title %}Log{% endblock %}
{% block body_class %}gallery-page{% endblock %}

{% block content %}
<div class="container my-5 gallery-shell">
    <section class="gallery-hero">
        <div>
            <p class="gallery-kicker">Field Capture Console</p>
            <h1 class="section-title mb-0">Log</h1>
            <p class="gallery-subtitle mb-0">Unified runtime log stream (push).</p>
        </div>
        <div class="gallery-hero-actions">
            <button id="connectStreamBtn" class="btn-download-dataset">Connect stream</button>
            <button id="disconnectStreamBtn" class="btn-download-dataset btn-download-secondary">Disconnect</button>
        </div>
    </section>

    <div class="card mb-3"><div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-4">
                <label for="logLinesSelect" class="form-label mb-1">Lines per source</label>
                <select id="logLinesSelect" class="form-select">
                    <option value="60">60</option>
                    <option value="120" selected>120</option>
                    <option value="200">200</option>
                    <option value="300">300</option>
                    <option value="500">500</option>
                </select>
            </div>
        </div>
    </div></div>

    <div class="card"><div class="card-body">
        <h2 class="h5 mb-2">Unified Log</h2>
        <pre id="unifiedLogBox" class="mb-3 p-3 rounded border bg-light" style="min-height: 360px; max-height: 70vh; overflow: auto; white-space: pre-wrap;">Waiting for stream...</pre>
        <pre id="logPageStatus" class="mb-0 p-3 rounded border bg-light" style="min-height: 80px; white-space: pre-wrap;">Ready</pre>
    </div></div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', filename='log-page.js') }}"></script>
{% endblock %}
